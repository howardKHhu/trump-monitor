<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Primary SEO ── -->
  <title>川普 Truth Social 即時監控｜繁體中文翻譯</title>
  <meta name="description" content="即時追蹤川普在 Truth Social 上的最新發文，自動翻譯成繁體中文與日文，支援關鍵字與日期搜尋。Trump @realDonaldTrump posts translated to Traditional Chinese and Japanese." />
  <meta name="keywords" content="川普, Trump, Truth Social, 即時監控, 繁體中文翻譯, realDonaldTrump, 川普發文, 川普貼文, トランプ" />
  <meta name="author" content="Truth Social Monitor" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="/" />

  <!-- ── Open Graph (Facebook / LINE preview) ── -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="川普 Truth Social 監控" />
  <meta property="og:title"       content="川普 Truth Social 即時監控｜繁體中文翻譯" />
  <meta property="og:description" content="即時追蹤川普在 Truth Social 上的最新發文，自動翻譯成繁體中文與日文，支援關鍵字與日期搜尋。" />
  <meta property="og:image"       content="/static/og-image.png" />
  <meta property="og:locale"      content="zh_TW" />
  <meta property="og:locale:alternate" content="ja_JP" />

  <!-- ── Twitter Card ── -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="川普 Truth Social 即時監控｜繁體中文翻譯" />
  <meta name="twitter:description" content="即時追蹤川普在 Truth Social 上的最新發文，自動翻譯成繁體中文與日文。" />
  <meta name="twitter:image"       content="/static/og-image.png" />

  <!-- ── Favicon ── -->
  <link rel="icon"             type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="alternate icon"   type="image/png"     href="/static/favicon.svg" />
  <link rel="apple-touch-icon"                      href="/static/favicon.svg" />
  <meta name="theme-color" content="#e9533a" />

  <!-- ── Structured Data ── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "川普 Truth Social 即時監控",
    "description": "即時追蹤川普在 Truth Social 上的最新發文，自動翻譯成繁體中文與日文",
    "url": "/",
    "inLanguage": ["zh-TW", "ja"],
    "about": {
      "@type": "Person",
      "name": "Donald J. Trump",
      "sameAs": "https://truthsocial.com/@realDonaldTrump"
    }
  }
  </script>

  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <img src="/static/favicon.svg" alt="Logo" class="logo-img" width="36" height="36" />
        <div>
          <h1 id="site-title">Truth Social 即時監控</h1>
          <p id="site-subtitle">川普官方帳號 @realDonaldTrump</p>
        </div>
      </div>
      <div class="header-meta">
        <span id="status-badge" class="badge badge-idle">等待中</span>
        <span id="last-updated" class="last-updated"></span>
        <button id="token-btn" class="btn-token" title="設定 Token">🔑</button>
      </div>
    </div>
  </header>

  <!-- ── Token Modal ── -->
  <div id="token-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2 id="modal-title">設定 Access Token</h2>
      <p id="modal-desc" class="modal-desc"></p>
      <ol id="modal-steps" class="modal-steps"></ol>
      <textarea id="token-input" rows="4" placeholder="Bearer token..."></textarea>
      <div class="modal-footer">
        <button id="modal-cancel" class="btn-secondary">取消</button>
        <button id="modal-save" class="btn-primary">儲存並立即抓取</button>
      </div>
    </div>
  </div>

  <!-- ── Main ── -->
  <main>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜尋關鍵字..." autocomplete="off" />
      <div class="date-row">
        <label id="label-from">從</label>
        <input type="date" id="date-from" />
        <label id="label-to">至</label>
        <input type="date" id="date-to" />
        <button id="clear-btn">清除</button>
      </div>
    </div>

    <div id="posts-container"></div>

    <div class="pagination" id="pagination" style="display:none">
      <button id="prev-btn" disabled>← 上一頁</button>
      <span id="page-info"></span>
      <button id="next-btn">下一頁 →</button>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
